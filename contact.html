<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | The Gems & Co. India</title>
    <meta name="description" content="Get in touch with The Gems & Co. for inquiries about our luxury minimalist jewelry.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo">THEGEMS&CO.</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cart.html">Cart</a></li>
                    <li class="profile-dropdown">
                        <a href="javascript:void(0)" class="profile-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </a>
                        <div class="dropdown-menu">
                            <a href="#">Orders</a>
                            <a href="cart.html">Cart</a>
                            <a href="#">Settings</a>
                            <a href="#" id="logout-btn">Logout</a>
                        </div>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="section contact-page-section">
        <div class="container contact-container">
            <div class="contact-header fade-up visible">
                <h2 class="section-title">Get in Touch</h2>
                <p class="subtitle">We're here to help you find your perfect piece.</p>
            </div>
            
            <div class="form-wrapper fade-up visible">
                <form id="contact-form" class="minimal-form">
                    <div class="form-group">
                        <input type="text" id="name" name="name" required placeholder="Your Name">
                        <label for="name">Your Name</label>
                    </div>
                    
                    <div class="form-group">
                        <input type="email" id="email" name="email" required placeholder="Email Address">
                        <label for="email">Email Address</label>
                    </div>
                    
                    <div class="form-group">
                        <textarea id="message" name="message" required placeholder="How can we assist you?"></textarea>
                        <label for="message">Your Message</label>
                    </div>
                    
                    <button type="submit" class="btn btn-submit">Send Message</button>
                    <p class="form-footer-text">We aim to reply within 24 business hours.</p>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 TG&CO. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="cart.js"></script>
    <script src="main.js"></script>
</body>
</html>
