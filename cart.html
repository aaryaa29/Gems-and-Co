    <meta name="description" content="View your luxury jewelry selections.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo">THEGEMS&CO.</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cart.html">Cart</a></li>
                    <li class="profile-dropdown">
                        <a href="javascript:void(0)" class="profile-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </a>
                        <div class="dropdown-menu">
                            <a href="#">Orders</a>
                            <a href="cart.html">Cart</a>

                        </div>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="section cart-page-section">
        <div class="container cart-container fade-up visible">
            <div class="cart-header">
                <h2 class="section-title">Your Curated Selection</h2>
                <p class="subtitle">Review the pieces you've selected.</p>
            </div>
            
            <div class="cart-wrapper">
                <div id="cart-items-container">
                    <!-- Cart items populated by cart.js -->
                </div>
                
                <div id="cart-total" class="cart-summary" style="display: none;">
                    <div class="summary-row">
                        <span>Estimated Total</span> 
                        <span id="cart-total-amount">Rs 0</span>
                    </div>
                    <div class="cart-actions">
                        <a href="shop.html" class="btn btn-outline">Continue Shopping</a>
                        <button class="btn btn-checkout" onclick="alert('Proceeding to premium checkout...')">Secure Checkout</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 TG&CO. All Rights Reserved.</p>
        </div>

    <script src="cart.js"></script>
    <script src="main.js"></script>
