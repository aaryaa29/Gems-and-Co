<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | The Gems & Co. India</title>
    <meta name="description" content="Create a new account at The Gems & Co.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo">THEGEMS&CO.</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="section contact-page-section">
        <div class="container contact-container">
            <div class="contact-header fade-up visible">
                <h2 class="section-title">Create Account</h2>
                <p class="subtitle">Join us to curate your personal luxury jewelry collection.</p>
            </div>
            
            <div class="form-wrapper fade-up visible">
                <form id="register-form" class="minimal-form">
                    <div class="form-group">
                        <input type="text" id="register-name" required placeholder="Full Name">
                        <label for="register-name">Full Name</label>
                    </div>

                    <div class="form-group">
                        <input type="email" id="register-email" required placeholder="Email Address">
                        <label for="register-email">Email Address</label>
                    </div>
                    
                    <div class="form-group">
                        <input type="password" id="register-password" required placeholder="Password">
                        <label for="register-password">Password</label>
                    </div>
                    
                    <button type="submit" class="btn btn-submit">Register</button>
                    <p class="form-footer-text">Already have an account? <a href="login.html" style="color: var(--color-accent); font-weight: bold; text-decoration: none;">Login here</a></p>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 TG&CO. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="cart.js"></script>
    <script src="main.js"></script>
</body>
</html>
