<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The Gems & Co. India</title>
    <meta name="description" content="Access your personal luxury jewelry account.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo">THEGEMS&CO.</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="section contact-page-section">
        <div class="container contact-container">
            <div class="contact-header fade-up visible">
                <h2 class="section-title">Welcome Back</h2>
                <p class="subtitle">Enter your credentials to access your curated collection.</p>
            </div>
            
            <div class="form-wrapper fade-up visible">
                <form id="login-form" class="minimal-form">
                    <div class="form-group">
                        <input type="email" id="login-email" required placeholder="Email Address">
                        <label for="login-email">Email Address</label>
                    </div>
                    
                    <div class="form-group">
                        <input type="password" id="login-password" required placeholder="Password">
                        <label for="login-password">Password</label>
                    </div>
                    
                    <button type="submit" class="btn btn-submit">Sign In</button>
                    <p class="form-footer-text">Don't have an account? <a href="register.html" style="color: var(--color-accent); font-weight: bold; text-decoration: none;">Register here</a></p>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 TG&CO. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="cart.js"></script>
    <script src="main.js"></script>
</body>
</html>
